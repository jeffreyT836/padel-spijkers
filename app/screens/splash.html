<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bandeja Padel — Log in</title>
  <link rel="stylesheet" href="../css/app.css">
  <style>
    .splash-screen {
      display: flex;
      flex-direction: column;
      min-height: 100svh;
      background: var(--c-black);
      position: relative;
      overflow: hidden;
    }

    /* Court line background art */
    .splash-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .splash-bg::before {
      content: '';
      position: absolute;
      bottom: -80px; left: -80px;
      width: 420px; height: 420px;
      border: 1px solid rgba(46,204,113,0.12);
      border-radius: 50%;
    }
    .splash-bg::after {
      content: '';
      position: absolute;
      bottom: -160px; left: -160px;
      width: 580px; height: 580px;
      border: 1px solid rgba(46,204,113,0.06);
      border-radius: 50%;
    }
    .splash-line {
      position: absolute;
      top: 0; left: 50%;
      width: 1px; height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(46,204,113,0.08) 40%, rgba(46,204,113,0.04));
    }
    .splash-court {
      position: absolute;
      bottom: 200px; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 110px;
      border: 1px solid rgba(168,230,61,0.1);
    }
    .splash-court::before {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px;
      background: rgba(168,230,61,0.1);
    }
    .splash-court::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 1px;
      background: rgba(168,230,61,0.1);
    }
    .splash-glow {
      position: absolute;
      bottom: -100px; left: 50%;
      transform: translateX(-50%);
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(46,204,113,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Status bar */
    .splash-status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 24px 8px;
      font-family: var(--f-display);
      font-size: 15px;
      font-weight: 700;
    }
    .splash-status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
      font-size: 12px;
    }

    /* Hero branding */
    .splash-hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px var(--pad);
      position: relative;
      z-index: 2;
    }
    .splash-logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 48px;
    }
    .splash-logo-img {
      width: 72px; height: 72px;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }
    .splash-brand {
      font-family: var(--f-display);
      font-weight: 900;
      font-size: 28px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--c-white);
      text-align: center;
      line-height: 1.1;
    }
    .splash-brand span {
      color: var(--c-green);
    }
    .splash-tag {
      font-family: var(--f-body);
      font-size: 14px;
      color: var(--c-gray);
      letter-spacing: 0.04em;
      margin-top: 6px;
    }

    /* Login form */
    .splash-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .splash-label {
      font-family: var(--f-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--c-gray);
      margin-bottom: 4px;
      display: block;
    }
    .splash-input {
      width: 100%;
      height: 52px;
      background: var(--c-slate);
      border: 1px solid var(--c-border);
      border-radius: var(--r-md);
      padding: 0 16px;
      font-family: var(--f-body);
      font-size: 15px;
      color: var(--c-white);
      outline: none;
      transition: border-color 0.2s;
    }
    .splash-input:focus {
      border-color: var(--c-green);
    }
    .splash-input::placeholder { color: var(--c-gray); opacity: 0.6; }

    .splash-btn-primary {
      width: 100%;
      height: 52px;
      background: var(--c-green);
      color: var(--c-black);
      border-radius: var(--r-md);
      font-family: var(--f-display);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      margin-top: 4px;
      transition: opacity 0.2s;
    }
    .splash-btn-primary:active { opacity: 0.85; }

    .splash-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--c-gray);
      font-size: 12px;
      letter-spacing: 0.04em;
    }
    .splash-divider::before,
    .splash-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--c-border);
    }

    .splash-socials {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .splash-social-btn {
      height: 48px;
      background: var(--c-slate);
      border: 1px solid var(--c-border);
      border-radius: var(--r-md);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--f-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--c-white);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .splash-social-btn:active { border-color: var(--c-green); }

    .splash-footer {
      text-align: center;
      padding: 16px var(--pad) 32px;
      font-size: 13px;
      color: var(--c-gray);
      position: relative;
      z-index: 2;
    }
    .splash-footer a {
      color: var(--c-green);
      font-weight: 600;
    }

    /* Forgot password */
    .splash-forgot {
      text-align: right;
      font-size: 13px;
      color: var(--c-green);
      font-weight: 500;
      cursor: pointer;
      margin-top: -4px;
    }
  </style>
</head>
<body>
  <div class="splash-screen">
    <!-- Background art -->
    <div class="splash-bg"></div>
    <div class="splash-line"></div>
    <div class="splash-court"></div>
    <div class="splash-glow"></div>

    <!-- Status bar mock -->
    <div class="splash-status">
      <span>9:41</span>
      <div class="splash-status-icons">
        <span>●●●</span>
        <span>WiFi</span>
        <span>⚡</span>
      </div>
    </div>

    <!-- Hero branding + form -->
    <div class="splash-hero">
      <div class="splash-logo-wrap">
        <img class="splash-logo-img" src="../../images/logo/logo-Bandeja-Spijkers.png" alt="Bandeja Padel Spijkers">
        <div>
          <div class="splash-brand">Bandeja <span>Padel</span><br>Spijkers</div>
          <div class="splash-tag">Padel toernooien Rotterdam</div>
        </div>
      </div>

      <form class="splash-form" onsubmit="return false;">
        <div>
          <label class="splash-label">E-mailadres</label>
          <input class="splash-input" type="email" placeholder="jouw@email.nl" value="sander@devries.nl">
        </div>
        <div>
          <label class="splash-label">Wachtwoord</label>
          <input class="splash-input" type="password" placeholder="••••••••" value="••••••••">
        </div>
        <div class="splash-forgot">Wachtwoord vergeten?</div>
        <a href="home.html">
          <button class="splash-btn-primary" type="button">Inloggen</button>
        </a>

        <div class="splash-divider">of</div>

        <div class="splash-socials">
          <button class="splash-social-btn" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button class="splash-social-btn" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
          </button>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="splash-footer">
      Nog geen account? <a href="#">Registreer gratis</a>
    </div>
  </div>
</body>
</html>
